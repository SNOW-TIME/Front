<div class="container">
    <div class="button-group mt-4">
        <button class="btn">강의실 시간표 보기</button>
    </div>
    <button class="back-btn">←</button>

    <!-- 건물 선택 섹션 -->
    <div class="building-section">
        <div class="section-title">확인할 건물을 고르세요!</div>
        <select class="dropdown" id="building-select">
            <option>프라임관</option>
            <option>미래창조관</option>
            <option>과학관</option>
            <option>도서관</option>
            <option>르네상스프라자</option>
            <option>미술대학</option>
            <option>백주년기념관</option>
            <option>순헌관</option>
            <option>명신관</option>
            <option>수련교수회관</option>
            <option>약학대학</option>
            <option>음학대학</option>
            <option>행정관</option>
            <option>행파교수회관</option>
            <option>진리관</option>
            <option>새힘관(명신신관)</option>
            <option>다목적관</option>
        </select>
    </div>

    <!-- 층 입력 섹션 -->
    <div class="section">
        <div class="section-title">확인할 층을 입력하세요!</div>
        
        <div class="input-section">
            <input type="text" class="time-input" min="1" max="12">
            <span class="time-separator">층</span>
        </div>
        <div>지하 n층은 "Bn"으로 입력해주세요</div>
    </div>


    <!-- 강의실 조건 섹션 -->
    <div class="building-section">
        <div class="section-title">강의실의 조건을 고르세요!</div>
        <div class="checkbox-group">
            <div class="checkbox-row">
                <div class="checkbox-label">콘센트가 있어야 해요</div>
                <div class="checkbox" onclick="toggleCheckbox(this)"></div>
            </div>
            <div class="checkbox-row">
                <div class="capacity-info">
                    <div class="checkbox-label">수용</div>
                    <div class="checkbox-label">인원</div>
                </div>
                <div class="capacity-options">
                    <div class="checkbox-container">
                        <span class="checkbox-label">대형(~ 명)</span>
                        <div class="checkbox" onclick="toggleCheckbox(this)"></div>
                    </div>
                    <div class="checkbox-container">
                        <span class="checkbox-label">중형(~ 명)</span>
                        <div class="checkbox" onclick="toggleCheckbox(this)"></div>
                    </div>
                    <div class="checkbox-container">
                        <span class="checkbox-label">소형(~ 명)</span>
                        <div class="checkbox" onclick="toggleCheckbox(this)"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

     <div class="button-group mt-4">
        <button class="btn">강의실 시간표 확인</button>
    </div>
