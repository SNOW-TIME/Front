<div class="container">
    <div class="button-group mt-4">
        <button class="btn">빈 강의실 찾아 보기</button>
    </div>
    <button class="back-btn" onclick="goBack()">←</button>

    <!-- 시간 입력 섹션 -->
    <div class="section">
        <div class="section-title">확인할 시간대를 입력하세요!</div>
        
        <div class="input-section">
            <div class="am-pm-buttons">
                <button class="am-pm-btn selected" data-value="AM">오전</button>
                <button class="am-pm-btn" data-value="PM">오후</button>
            </div>

            <div class="time-inputs">
                <input type="number" class="time-input" min="1" max="12" id="hour">
                <span class="time-separator">시</span>
                <input type="number" class="time-input" min="0" max="59" id="minute">
                <span class="time-separator">분</span>
            </div>
        </div>
        <div class="existing-lectures">에 비어 있는 강의실 확인 ></div>
    </div>

    <!-- 건물 선택 섹션 -->
    <div class="building-section">
        <div class="section-title">확인할 건물을 고르세요!</div>
        <select class="dropdown" id="building-select">
            <option>프라임관</option>
            <option>미래창조관</option>
            <option>과학관</option>
            <option>도서관</option>
            <option>르네상스프라자</option>
            <option>미술대학</option>
            <option>백주년기념관</option>
            <option>순헌관</option>
            <option>명신관</option>
            <option>수련교수회관</option>
            <option>약학대학</option>
            <option>음학대학</option>
            <option>행정관</option>
            <option>행파교수회관</option>
            <option>진리관</option>
            <option>새힘관(명신신관)</option>
            <option>다목적관</option>
        </select>
    </div>

    <!-- 검색 섹션 -->
    <div class="search-section">
        <div class="search-input-section">
            <div>
                <input type="text" class="search-input">
                <span class="search-label">이</span>
            </div>
            <div class="search-input-row">
                <div class="search-input">
                    <input type="number" class="search-input-time" min="1" max="12">
                    <span class="search-label">시</span>
                    <input type="number" class="search-input-time" min="0" max="59">
                    <span class="search-label">분</span>
                </div>
                <span class="outside-label">에</span>
            </div>
            <div class="search-btn-text">비어 있는 강의실 확인 ></div>
        </div>
    </div>
</div>
